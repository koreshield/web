version: '3.8'

services:
        # Backend API Service
        api:
                build:
                        context: ./koreshield
                        dockerfile: Dockerfile
                image: koreshield:latest
                container_name: koreshield-api
                ports:
                        - "8000:8000"
                environment:
                        - DATABASE_URL=postgresql://${POSTGRES_USER:-koreshield}:${POSTGRES_PASSWORD:-koreshield_password}@postgres:5432/${POSTGRES_DB:-koreshield}
                        - REDIS_URL=redis://redis:6379/0
                        - ENVIRONMENT=production
                        - JWT_SECRET=${JWT_SECRET:-koreshield_default_secret_32_chars_long_!!}
                        - JWT_ISSUER=koreshield-auth
                        - JWT_AUDIENCE=koreshield-api
                        - CORS_ORIGINS=https://koreshield.com,https://www.koreshield.com,https://api.koreshield.com
                        - POLAR_SERVER=${POLAR_SERVER:-production}
                        - POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}
                        - POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET}
                        - POLAR_ORGANIZATION_SLUG=${POLAR_ORGANIZATION_SLUG:-koreshield}
                        - POLAR_ORGANIZATION_ID=${POLAR_ORGANIZATION_ID}
                        - POLAR_DEFAULT_CURRENCY=${POLAR_DEFAULT_CURRENCY:-GBP}
                        # Add API Keys here or in a .env file on the VPS
                        # - OPENAI_API_KEY=${OPENAI_API_KEY}
                healthcheck:
                        test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'" ]
                        interval: 30s
                        timeout: 10s
                        retries: 3
                depends_on:
                        postgres:
                                condition: service_healthy
                        redis:
                                condition: service_healthy
                restart: always
                networks:
                        - koreshield-net

        # Frontend Web Service
        web:
                build:
                        context: ./koreshield-web
                        dockerfile: Dockerfile
                        args:
                                - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
                                - VITE_POLAR_STARTUP_PRODUCT_ID=${VITE_POLAR_STARTUP_PRODUCT_ID}
                                - VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID=${VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID}
                                - VITE_POLAR_GROWTH_PRODUCT_ID=${VITE_POLAR_GROWTH_PRODUCT_ID}
                                - VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID=${VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID}
                image: koreshield-web:latest
                container_name: koreshield-web
                ports:
                        - "3000:80"
                depends_on:
                        - api
                restart: always
                networks:
                        - koreshield-net

        # PostgreSQL Database
        postgres:
                image: postgres:15-alpine
                container_name: koreshield-postgres
                environment:
                        POSTGRES_USER: ${POSTGRES_USER:-koreshield}
                        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koreshield_password}
                        POSTGRES_DB: ${POSTGRES_DB:-koreshield}
                volumes:
                        - postgres_data:/var/lib/postgresql/data
                healthcheck:
                        test: [ "CMD-SHELL", "pg_isready -U koreshield" ]
                        interval: 10s
                        timeout: 5s
                        retries: 5
                restart: always
                networks:
                        - koreshield-net

        # Redis Cache
        redis:
                image: redis:7-alpine
                container_name: koreshield-redis
                volumes:
                        - redis_data:/data
                healthcheck:
                        test: [ "CMD", "redis-cli", "ping" ]
                        interval: 10s
                        timeout: 5s
                        retries: 5
                restart: always
                networks:
                        - koreshield-net

        # Caddy Reverse Proxy
        caddy:
                image: caddy:2-alpine
                restart: always
                ports:
                        - "80:80"
                        - "443:443"
                volumes:
                        - ./Caddyfile:/etc/caddy/Caddyfile
                        - caddy_data:/data
                        - caddy_config:/config
                depends_on:
                        - api
                        - web
                networks:
                        - koreshield-net

networks:
        koreshield-net:
                driver: bridge

volumes:
        postgres_data:
        redis_data:
        caddy_data:
        caddy_config:
