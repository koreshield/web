services:
        # Backend API Service
        api:
                container_name: koreshield-api
                build:
                        context: ./koreshield
                        dockerfile: Dockerfile
                image: koreshield:latest
                ports:
                        - "127.0.0.1:8000:8000" # Restricted to local loopback (host health checks)
                deploy:
                        resources:
                                limits:
                                        cpus: '0.50'
                                        memory: 512M
                                reservations:
                                        memory: 128M
                logging:
                        driver: "json-file"
                        options:
                                max-size: "10m"
                                max-file: "3"
                environment:
                        - DATABASE_URL=${DATABASE_URL}
                        - REDIS_URL=redis://redis:6379/0
                        - ENVIRONMENT=production
                        - KORESHIELD_APP_URL=${KORESHIELD_APP_URL:-https://koreshield.com}
                        - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://koreshield.com}
                        - APP_BASE_URL=${APP_BASE_URL:-https://koreshield.com}
                        - JWT_SECRET=${JWT_SECRET}
                        - JWT_ISSUER=koreshield-auth
                        - JWT_AUDIENCE=koreshield-api
                        - CORS_ORIGINS=https://koreshield.com,https://www.koreshield.com,https://api.koreshield.com
                        - POLAR_SERVER=${POLAR_SERVER:-production}
                        - POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}
                        - POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET}
                        - POLAR_ORGANIZATION_SLUG=${POLAR_ORGANIZATION_SLUG:-koreshield}
                        - POLAR_ORGANIZATION_ID=${POLAR_ORGANIZATION_ID}
                        - POLAR_DEFAULT_CURRENCY=${POLAR_DEFAULT_CURRENCY:-GBP}
                        - TELEGRAM_ALERTS_ENABLED=${TELEGRAM_ALERTS_ENABLED:-false}
                        - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
                        - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
                        - TELEGRAM_MESSAGE_THREAD_ID=${TELEGRAM_MESSAGE_THREAD_ID}
                        - TELEGRAM_MINIMUM_INTERVAL_SECONDS=${TELEGRAM_MINIMUM_INTERVAL_SECONDS:-5.0}
                        - BILLING_INTERNAL_UNLIMITED_EMAILS=${BILLING_INTERNAL_UNLIMITED_EMAILS}
                        - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
                        - OPENAI_API_KEY=${OPENAI_API_KEY}
                        - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
                        - GOOGLE_API_KEY=${GOOGLE_API_KEY}
                        - GEMINI_API_KEY=${GEMINI_API_KEY}
                        - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
                        - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
                        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
                        - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
                        - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
                        - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
                        - RESEND_API_KEY=${RESEND_API_KEY}
                        - ENABLED_PROVIDERS=${ENABLED_PROVIDERS}
                healthcheck:
                        test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'" ]
                        interval: 30s
                        timeout: 10s
                        retries: 3
                depends_on:
                        postgres:
                                condition: service_healthy
                        redis:
                                condition: service_healthy
                restart: always
                networks:
                        - koreshield-net

        # Frontend Web Service
        web:
                container_name: koreshield-web
                build:
                        context: ./koreshield-web
                        dockerfile: Dockerfile
                        args:
                                - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
                                - VITE_POLAR_STARTUP_PRODUCT_ID=${VITE_POLAR_STARTUP_PRODUCT_ID}
                                - VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID=${VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID}
                                - VITE_POLAR_GROWTH_PRODUCT_ID=${VITE_POLAR_GROWTH_PRODUCT_ID}
                                - VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID=${VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID}
                                - VITE_EMAILJS_SERVICE_ID=${VITE_EMAILJS_SERVICE_ID}
                                - VITE_EMAILJS_TEMPLATE_ID=${VITE_EMAILJS_TEMPLATE_ID}
                                - VITE_EMAILJS_TEMPLATE_ID_CONTACT=${VITE_EMAILJS_TEMPLATE_ID_CONTACT}
                                - VITE_EMAILJS_PUBLIC_KEY=${VITE_EMAILJS_PUBLIC_KEY}
                image: koreshield-web:latest
                ports:
                        - "127.0.0.1:3000:80" # Restricted to local loopback (host health checks)
                deploy:
                        resources:
                                limits:
                                        cpus: '0.25'
                                        memory: 256M
                logging:
                        driver: "json-file"
                        options:
                                max-size: "10m"
                                max-file: "3"
                depends_on:
                        - api
                restart: always
                networks:
                        - koreshield-net

        # PostgreSQL Database
        postgres:
                container_name: koreshield-postgres
                image: postgres:15-alpine
                environment:
                        POSTGRES_USER: ${POSTGRES_USER}
                        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                        POSTGRES_DB: ${POSTGRES_DB}
                volumes:
                        - postgres_data:/var/lib/postgresql/data
                healthcheck:
                        test: [ "CMD-SHELL", "pg_isready -U koreshield" ]
                        interval: 10s
                        timeout: 5s
                        retries: 5
                restart: always
                networks:
                        - koreshield-net
                logging:
                        driver: "json-file"
                        options:
                                max-size: "10m"
                                max-file: "3"

        # Redis Cache
        redis:
                container_name: koreshield-redis
                image: redis:7-alpine
                volumes:
                        - redis_data:/data
                command: redis-server --appendonly yes
                healthcheck:
                        test: [ "CMD", "redis-cli", "ping" ]
                        interval: 10s
                        timeout: 5s
                        retries: 5
                restart: always
                networks:
                        - koreshield-net

        # Caddy Reverse Proxy
        caddy:
                container_name: koreshield-caddy
                image: caddy:2-alpine
                restart: always
                ports:
                        - "80:80"
                        - "443:443"
                volumes:
                        - ./Caddyfile:/etc/caddy/Caddyfile
                        - caddy_data:/data
                        - caddy_config:/config
                depends_on:
                        - api
                        - web
                networks:
                        - koreshield-net

networks:
        koreshield-net:
                driver: bridge

volumes:
        postgres_data:
        redis_data:
        caddy_data:
        caddy_config:
