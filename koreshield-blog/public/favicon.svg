<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield outline -->
  <path d="M50 10 L80 25 L80 55 Q80 75 50 90 Q20 75 20 55 L20 25 Z" 
        fill="url(#shieldGradient)" 
        stroke="#3b82f6" 
        stroke-width="2"/>
  
  <!-- Padlock body -->
  <rect x="35" y="45" width="30" height="25" rx="3" 
        fill="#050a14" 
        stroke="#3b82f6" 
        stroke-width="1.5"/>
  
  <!-- Padlock shackle -->
  <path d="M40 45 L40 35 Q40 28 50 28 Q60 28 60 35 L60 45" 
        fill="none" 
        stroke="#3b82f6" 
        stroke-width="2"
        stroke-linecap="round"/>
  
  <!-- Keyhole -->
  <circle cx="50" cy="55" r="3" fill="#3b82f6"/>
  <rect x="48.5" y="57" width="3" height="7" rx="1.5" fill="#3b82f6"/>
</svg>
