<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<!-- Favicons with dark/light mode support -->
	<link rel="icon" href="/favicon-light.ico" sizes="32x32" media="(prefers-color-scheme: light)" />
	<link rel="icon" href="/favicon-dark.ico" sizes="32x32" media="(prefers-color-scheme: dark)" />
	<link rel="icon" href="/favicon-dark.ico" sizes="32x32" />
	<link rel="icon" type="image/png" sizes="192x192" href="/favicon-light-192.png" media="(prefers-color-scheme: light)" />
	<link rel="icon" type="image/png" sizes="192x192" href="/favicon-dark-192.png" media="(prefers-color-scheme: dark)" />
	<link rel="icon" type="image/png" sizes="512x512" href="/favicon-light-512.png" media="(prefers-color-scheme: light)" />
	<link rel="icon" type="image/png" sizes="512x512" href="/favicon-dark-512.png" media="(prefers-color-scheme: dark)" />
	<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>KoreShield - Security Firewall | AI Security Platform</title>
	<meta name="description"
		content="KoreShield is the  LLM security firewall that protects your AI infrastructure. Detect, prevent, and respond to LLM threats in real-time with advanced threat intelligence." />
	<meta name="keywords" content="LLM security, AI security, firewall, prompt injection, jailbreak detection, AI infrastructure protection, enterprise security" />
	<meta name="theme-color" content="#1a1a1a" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	
	<!-- Preconnect for performance -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="dns-prefetch" href="https://api.koreshield.com">
	<link rel="preconnect" href="https://api.koreshield.com">

	<!-- Sitemap and RSS -->
	<link rel="sitemap" href="https://koreshield.ai/sitemap.xml" />
	<link rel="alternate" type="application/rss+xml" href="https://koreshield.ai/status-feed.xml" />

	<!-- Open Graph for social sharing -->
	<meta property="og:title" content="KoreShield - Enterprise-Grade LLM Security Firewall" />
	<meta property="og:description" content="Protect your AI infrastructure with advanced LLM security. Detect prompt injections, jailbreaks, and threats in real-time." />
	<meta property="og:image" content="https://koreshield.ai/logo.png" />
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://koreshield.ai" />
	<meta property="og:site_name" content="KoreShield" />

	<!-- Twitter Card -->
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="KoreShield - Enterprise-Grade LLM Security Firewall" />
	<meta name="twitter:description" content="Protect your AI infrastructure with advanced LLM security. Detect prompt injections, jailbreaks, and threats in real-time." />
	<meta name="twitter:image" content="https://koreshield.ai/logo.png" />
	<meta name="twitter:site" content="@koreshield" />

	<!-- Structured Data (Organization) -->
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "Organization",
		"name": "KoreShield",
		"url": "https://koreshield.ai",
		"logo": "https://koreshield.ai/logo.png",
		"description": "Enterprise-grade LLM security firewall for protecting AI infrastructure",
		"sameAs": [
			"https://github.com/koreshield",
			"https://twitter.com/koreshield",
			"https://linkedin.com/company/koreshield"
		],
		"contactPoint": {
			"@type": "ContactPoint",
			"telephone": "+1-XXX-XXX-XXXX",
			"contactType": "Customer Service"
		}
	}
	</script>

	<!-- Structured Data (WebSite) -->
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "WebSite",
		"url": "https://koreshield.ai",
		"name": "KoreShield",
		"description": "Enterprise-grade LLM security firewall",
		"potentialAction": {
			"@type": "SearchAction",
			"target": {
				"@type": "EntryPoint",
				"urlTemplate": "https://koreshield.ai/search?q={search_term_string}"
			},
			"query-input": "required name=search_term_string"
		}
	}
	</script>
	<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap"
		rel="stylesheet">
	<!-- Security: Content Security Policy to mitigate XSS attacks -->
	<!-- Note: 'unsafe-inline' for scripts is required for Vite HMR in dev. Production builds use hashed scripts. -->
	<!-- Note: 'unsafe-eval' is required for Vite dev mode. Production builds don't use eval. -->
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' ws://localhost:* wss://localhost:* ws://127.0.0.1:* wss://127.0.0.1:* http://localhost:* http://127.0.0.1:* https://api.koreshield.com wss://api.koreshield.com https://koreshield.ai wss://koreshield.ai https://static.cloudflareinsights.com https://api.emailjs.com; img-src 'self' data: https:; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" />
	<!-- Security: Prevent MIME type sniffing -->
	<meta http-equiv="X-Content-Type-Options" content="nosniff" />
	<!-- Security: Enable XSS filter in older browsers -->
	<meta http-equiv="X-XSS-Protection" content="1; mode=block" />
	<!-- Security: Control referrer information -->
	<meta name="referrer" content="strict-origin-when-cross-origin" />
</head>

<body>
	<div id="root"></div>
	<script type="module" src="/src/main.tsx"></script>
</body>

</html>
