server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Static assets — content-hashed filenames, safe to cache aggressively
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # All other routes — SPA shell served as index.html.
    # Never cache HTML: Cloudflare would otherwise serve stale 404s for
    # new routes (e.g. /auth/google-callback, /auth/github-callback).
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (keeps credentials cookie on same base domain)
    location /v1/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /health {
        set $api_health_upstream http://api:8000/health;
        proxy_pass $api_health_upstream;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
