<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var path = window.location.pathname + window.location.search + window.location.hash;
        try {
          window.sessionStorage.setItem('koreshield-spa-redirect', path);
        } catch (error) {
          console.error('Failed to store SPA redirect path', error);
        }
        window.location.replace('/');
      })();
    </script>
  </head>
  <body></body>
</html>
