apiVersion: v1
kind: ConfigMap
metadata:
  name: koreshield-config
  namespace: default
data:
  config.yaml: |
    # Production Kubernetes Configuration
    server:
      host: "0.0.0.0"
      port: 8000

    logging:
      level: INFO
      json_logs: true
      container_mode: true

    security:
      sensitivity: medium
      default_action: block
      features:
        sanitization: true
        detection: true
        policy_enforcement: true

    providers:
      deepseek:
        enabled: true
        base_url: "https://api.deepseek.com/v1"
      openai:
        enabled: false
        base_url: "https://api.openai.com/v1"
      anthropic:
        enabled: false
        base_url: "https://api.anthropic.com/v1"

    redis:
      enabled: true
      url: "redis://koreshield-redis:6379/0"

    monitoring:
      enabled: true
      check_interval_seconds: 60

    alerting:
      enabled: true
      rules:
        - name: "High Attack Rate"
          condition: "attacks_detected > 10"
          severity: "warning"
          channels: ["webhook"]
          cooldown_minutes: 5
      webhook:
        enabled: true
        url: "https://your-alert-webhook.com/koreshield"
---
apiVersion: v1
kind: Secret
metadata:
  name: koreshield-secrets
  namespace: default
type: Opaque
data:
  # Base64 encoded API keys
  deepseek-api-key: <base64-encoded-key>
  # Add other API keys as needed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: koreshield
  namespace: default
  labels:
    app: koreshield
spec:
  replicas: 3
  selector:
    matchLabels:
      app: koreshield
  template:
    metadata:
      labels:
        app: koreshield
    spec:
      containers:
      - name: koreshield
        image: your-registry/koreshield:latest
        ports:
        - containerPort: 8000
        env:
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: koreshield-secrets
              key: deepseek-api-key
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config-volume
        configMap:
          name: koreshield-config
---
apiVersion: v1
kind: Service
metadata:
  name: koreshield
  namespace: default
  labels:
    app: koreshield
spec:
  selector:
    app: koreshield
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: koreshield-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.yourdomain.com
    secretName: koreshield-tls
  rules:
  - host: api.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: koreshield
            port:
              number: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: koreshield-redis
  namespace: default
  labels:
    app: koreshield-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: koreshield-redis
  template:
    metadata:
      labels:
        app: koreshield-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: koreshield-redis
  namespace: default
  labels:
    app: koreshield-redis
spec:
  selector:
    app: koreshield-redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP