# Railway-oriented configuration for the KoreShield backend.
# This file is intended for the backend-only Railway deployment path that uses
# koreshield/docker/Dockerfile with CONFIG_FILE=config/railway-config.yaml.

server:
  host: "0.0.0.0"
  port: 8000

logging:
  level: INFO
  json_logs: true
  container_mode: true

security:
  sensitivity: medium
  default_action: block
  features:
    sanitization: true
    detection: true
    policy_enforcement: true

providers:
  deepseek:
    enabled: true
    base_url: "https://api.deepseek.com/v1"

  openai:
    enabled: false
    base_url: "https://api.openai.com/v1"

  anthropic:
    enabled: false
    base_url: "https://api.anthropic.com/v1"

  gemini:
    enabled: true
    base_url: "https://generativelanguage.googleapis.com/v1beta"

  azure_openai:
    enabled: true
    base_url: "https://koreshieldai.cognitiveservices.azure.com"
    resource_name: "koreshieldai"
    api_version: "2025-01-01-preview"

redis:
  enabled: true
  url: "${REDIS_URL}"

jwt:
  issuer: "koreshield-auth"
  audience: "koreshield-api"

alerting:
  enabled: true
  rules:
    - name: "High Attack Rate"
      condition: "attacks_detected > 10"
      severity: "warning"
      channels: ["webhook"]
      cooldown_minutes: 5
      description: "Alert when attack detection rate is high"
      enabled: true

    - name: "Provider Down"
      condition: "healthy_providers == 0"
      severity: "critical"
      channels: ["webhook", "telegram"]
      cooldown_minutes: 10
      description: "Alert when all configured providers are unavailable"
      enabled: true

  webhook:
    enabled: true
    url: "${ALERT_WEBHOOK_URL}"

  telegram:
    enabled: true
    # bot token, channel id, and optional message thread id come from env vars

monitoring:
  enabled: true
  check_interval_seconds: 60
