version: '3.8'

services:
  koreshield:
    container_name: koreshield-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - status_data:/data

  status-updater:
    container_name: koreshield-status-updater
    image: python:3.11-slim
    restart: always
    volumes:
      - ./scripts/status_updater.py:/app/status_updater.py
      - status_data:/data
    command: >
      sh -c "pip install requests && python /app/status_updater.py"
    depends_on:
      - koreshield

  prometheus:
    image: prom/prometheus:latest
    container_name: koreshield-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - koreshield

  grafana:
    image: grafana/grafana:latest
    container_name: koreshield-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/koreshield-dashboard.json:/etc/grafana/provisioning/dashboards/koreshield-dashboard.json
    depends_on:
      - prometheus

  caddy:
    image: caddy:2-alpine
    container_name: koreshield-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - status_data:/www/status:ro
    depends_on:
      - koreshield
      - grafana

  postgres:
    image: postgres:15-alpine
    container_name: koreshield-postgres
    restart: always
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U koreshield" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: koreshield-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  status_data:
