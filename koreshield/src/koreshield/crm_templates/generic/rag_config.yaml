"""
Generic CRM RAG Security Template

This is the base template that can be customized for any CRM platform.
It provides a framework for mapping CRM fields to injection vectors
and defining platform-specific detection rules.
"""

# CRM Platform Configuration
platform:
  name: "Generic CRM"
  type: "base_template"
  version: "1.0"
  description: "Base template for CRM RAG security configuration"

# RAG Detection Configuration
rag_detection:
  enabled: true
  min_confidence: 0.3
  enable_cross_document_analysis: true
  max_documents_per_scan: 100

# Injection Vector Mapping
# Maps CRM data sources to taxonomy injection vectors
injection_vectors:
  # Email-based sources
  email:
    enabled: true
    sources:
      - field: "email_body"
        description: "Email message content"
        risk_level: "high"
      - field: "email_subject"
        description: "Email subject line"
        risk_level: "medium"
      - field: "email_signature"
        description: "Email signature"
        risk_level: "low"
  
  # Document-based sources
  document:
    enabled: true
    sources:
      - field: "attachments"
        description: "File attachments (PDF, Word, etc.)"
        risk_level: "high"
      - field: "notes"
        description: "User notes and comments"
        risk_level: "medium"
      - field: "descriptions"
        description: "Record descriptions"
        risk_level: "medium"
  
  # Database sources
  database:
    enabled: true
    sources:
      - field: "custom_fields"
        description: "Custom CRM fields"
        risk_level: "medium"
      - field: "activity_history"
        description: "Activity logs and history"
        risk_level: "low"
  
  # Chat/messaging sources
  chat_message:
    enabled: true
    sources:
      - field: "chat_messages"
        description: "Internal chat messages"
        risk_level: "high"
      - field: "comments"
        description: "Record comments"
        risk_level: "medium"

# High-Risk Fields
# Fields that should receive extra scrutiny
high_risk_fields:
  - name: "email_body"
    reason: "User-generated content, common attack vector"
    additional_patterns:
      - "urgent"
      - "verify your account"
      - "action required"
  
  - name: "attachments"
    reason: "Can contain embedded instructions"
    additional_patterns:
      - "confidential"
      - "internal use only"
  
  - name: "chat_messages"
    reason: "Real-time communication, low oversight"
    additional_patterns:
      - "off the record"
      - "don't share this"
  
  - name: "custom_fields"
    reason: "Often unvalidated user input"
    additional_patterns: []

# Detection Rules
# Platform-specific patterns to detect
detection_rules:
  - id: "generic_email_injection"
    name: "Email Injection Attack"
    description: "Detects malicious instructions in email content"
    pattern: "(?i)(ignore|bypass|override).*?(previous|safety|security)"
    severity: "high"
    injection_vector: "email"
    operational_targets:
      - "access_control_bypass"
      - "context_poisoning"
  
  - id: "generic_data_exfiltration"
    name: "Data Exfiltration Attempt"
    description: "Detects attempts to leak data"
    pattern: "(?i)(send|leak|export|transmit).{0,20}(external|outside|api|endpoint)"
    severity: "critical"
    injection_vector: "email"
    operational_targets:
      - "data_exfiltration"
  
  - id: "generic_privilege_escalation"
    name: "Privilege Escalation"
    description: "Detects attempts to gain elevated access"
    pattern: "(?i)(admin|administrator|root|superuser|elevated).{0,20}(access|privilege|permission)"
    severity: "high"
    injection_vector: "database"
    operational_targets:
      - "privilege_escalation"
      - "access_control_bypass"
  
  - id: "generic_context_poisoning"
    name: "Context Poisoning"
    description: "Detects attempts to modify future behavior"
    pattern: "(?i)(always|from now on|permanently|all future).{0,30}(respond|include|modify)"
    severity: "high"
    injection_vector: "document"
    operational_targets:
      - "context_poisoning"
  
  - id: "generic_hidden_instructions"
    name: "Hidden Instructions"
    description: "Detects steganographic instructions"
    pattern: "(?i)(\\[HIDDEN\\]|\\{SECRET\\}|<!--.*?(ignore|bypass|execute).*?-->)"
    severity: "medium"
    injection_vector: "document"
    operational_targets:
      - "context_poisoning"

# Field Sanitization Rules
sanitization:
  enabled: true
  rules:
    - field: "email_body"
      max_length: 10000
      strip_html: true
      remove_scripts: true
    
    - field: "attachments"
      max_size_mb: 10
      allowed_types:
        - "pdf"
        - "docx"
        - "txt"
      scan_for_malware: true
    
    - field: "custom_fields"
      max_length: 5000
      strip_html: true

# Enterprise Context Configuration
enterprise_context:
  primary: "crm"
  secondary:
    - "customer_support"
    - "sales"
  
  # Compliance requirements
  compliance:
    gdpr: true
    ccpa: true
    hipaa: false
    pci_dss: false

# Operational Targets Priority
# Higher priority targets trigger stricter policies
operational_targets_priority:
  critical:
    - "data_exfiltration"
    - "privilege_escalation"
  high:
    - "access_control_bypass"
    - "context_poisoning"
  medium:
    - "system_prompt_leaking"
    - "misinformation"
  low:
    - "reconnaissance"

# Response Actions
# What to do when threats are detected
response_actions:
  block:
    enabled: true
    severity_threshold: "medium"
    
  alert:
    enabled: true
    channels:
      - "email"
      - "webhook"
    recipients:
      - "security@company.com"
  
  quarantine:
    enabled: true
    severity_threshold: "high"
    retention_days: 30
  
  log:
    enabled: true
    log_level: "info"
    include_context: true

# Integration Settings
integration:
  api_endpoint: "/v1/rag/scan"
  authentication: "bearer_token"
  rate_limit: "1000/hour"
  timeout_ms: 5000
  
  retry:
    enabled: true
    max_attempts: 3
    backoff_ms: 1000

# Monitoring & Metrics
monitoring:
  enabled: true
  metrics:
    - "scans_total"
    - "threats_detected"
    - "threats_by_vector"
    - "threats_by_target"
    - "processing_time_ms"
  
  alerts:
    - name: "High Threat Volume"
      condition: "threats_detected > 10 in 5 minutes"
      action: "notify_security_team"
    
    - name: "Critical Threat Detected"
      condition: "severity == critical"
      action: "immediate_notification"

# Customization Guide
customization:
  instructions: |
    To customize this template for your CRM:
    
    1. Update platform.name and platform.description
    2. Map your CRM fields to injection_vectors
    3. Add platform-specific detection_rules
    4. Configure high_risk_fields based on your data model
    5. Set enterprise_context based on your industry
    6. Adjust response_actions based on your security policy
  
  examples:
    - name: "Custom Field Mapping"
      description: "Map a CRM 'case_description' field to document injection vector"
      code: |
        injection_vectors:
          document:
            sources:
              - field: "case_description"
                description: "Support case description"
                risk_level: "high"
    
    - name: "Custom Detection Rule"
      description: "Add a rule for detecting social engineering"
      code: |
        detection_rules:
          - id: "custom_social_engineering"
            name: "Social Engineering Attempt"
            pattern: "(?i)(urgent|immediate|verify).{0,20}(account|password|credentials)"
            severity: "high"
            injection_vector: "email"
