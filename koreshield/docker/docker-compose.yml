version: '3.8'

services:
  koreshield:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - JSON_LOGS=false
      - KORESHIELD_APP_URL=${KORESHIELD_APP_URL:-https://koreshield.com}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://koreshield.com}
      - APP_BASE_URL=${APP_BASE_URL:-https://koreshield.com}
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ../config:/app/config
      - ../logs:/app/logs
    restart: unless-stopped
