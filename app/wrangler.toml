# Cloudflare Pages configuration
name = "koreshield-web"
pages_build_output_dir = "dist/client"
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2026-01-24"

# NOTE: Pages projects validate the wrangler file and do not support a
# top-level [build] section. Put the build command in the Pages
# dashboard (or use the API). Keep `pages_build_output_dir` and
# `compatibility_flags` so Pages Functions will enable Node.js
# compatibility during bundling.
