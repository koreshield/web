# Cloudflare Pages — unified koreshield.ai deployment
#
# URL layout:
#   koreshield.ai/          → TanStack Start worker (marketing, /docs/*, /app/*)
#   koreshield.ai/blog/*    → Astro static output  (dist/blog/)
#   koreshield.ai/studio/*  → Sanity Studio static (dist/studio/)
#   api.koreshield.com      → backend (separate Worker, not in this config)
#
# Build:  npm run build   (from web/)
# Output: web/dist/

name = "koreshield-web"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

