name: Deploy to VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'koreshield/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    # Deploy to VPS via SCP
    - name: Copy files via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        # Copy entire backend directory to preserve structure
        source: "koreshield"
        target: "/opt/koreshield_deploy"
        strip_components: 0

    - name: Execute Remote Deployment
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
        script: |
          # Create destination if not exists
          mkdir -p /opt/koreshield
          
          # Sync backend directory to /opt/koreshield/koreshield
          rsync -av --delete /opt/koreshield_deploy/koreshield /opt/koreshield/
          
          # We deploy config files inside koreshield/
          # So we run docker-compose FROM /opt/koreshield/koreshield
          cd /opt/koreshield/koreshield
          
          # Ensure we use the .env from the parent directory (/opt/koreshield/.env)
          # We can symlink it or pass --env-file
          ln -sf ../.env .env
          
          # Rebuild and restart
          docker-compose -f docker-compose.prod.yml up -d --build --remove-orphans
          
          # Prune unused images
          docker image prune -f
