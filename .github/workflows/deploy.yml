name: Deploy to VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'koreshield/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    # Deploy to VPS via SCP
    - name: Copy files via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        # Copy entire backend directory to preserve structure
        source: "koreshield"
        target: "/opt/koreshield_deploy"
        strip_components: 0

    - name: Execute Remote Deployment
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          # Create destination if not exists
          mkdir -p /opt/koreshield
          
          # Sync backend directory to /opt/koreshield/koreshield
          rsync -av --delete /opt/koreshield_deploy/koreshield /opt/koreshield/
          
          # Move config files to root (since docker-compose context depends on it being in root)
          # We deploy them to /opt/koreshield/ (Repo Root equivalent)
          mv /opt/koreshield/koreshield/docker-compose.prod.yml /opt/koreshield/
          mv /opt/koreshield/koreshield/Caddyfile /opt/koreshield/
          
          cd /opt/koreshield
          
          # Ensure .env exists (it should, from manual set up)

          # We do NOT overwrite .env from git (it's not in git)
          
          # Rebuild and restart
          docker-compose -f docker-compose.prod.yml up -d --build --remove-orphans
          
          # Prune unused images
          docker image prune -f
