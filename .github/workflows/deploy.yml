name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate blog content
        run: node generate-blog.cjs

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WS_BASE_URL: wss://api.koreshield.com
          VITE_ENV: production
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_TEMPLATE_ID_CONTACT: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID_CONTACT }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_POLAR_STARTUP_PRODUCT_ID: ${{ secrets.VITE_POLAR_STARTUP_PRODUCT_ID }}
          VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID: ${{ secrets.VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID }}
          VITE_POLAR_GROWTH_PRODUCT_ID: ${{ secrets.VITE_POLAR_GROWTH_PRODUCT_ID }}
          VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID: ${{ secrets.VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=koreshield --branch=main
