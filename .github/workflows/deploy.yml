name: Deploy to VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'docker-compose.prod.yml'
      - 'Caddyfile'
      - 'koreshield/**'
      - 'koreshield-web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Copy root deployment files via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        source: "docker-compose.prod.yml,Caddyfile"
        target: "/opt/koreshield_deploy"
        strip_components: 0

    # ── Copy backend source ────────────────────────────────────────────────────
    - name: Copy backend via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        source: "koreshield"
        target: "/opt/koreshield_deploy"
        strip_components: 0

    # ── Copy frontend source ───────────────────────────────────────────────────
    - name: Copy frontend via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        source: "koreshield-web"
        target: "/opt/koreshield_deploy"
        strip_components: 0

    # ── SSH deploy (password auth — no SSH key required) ───────────────────────
    - name: Execute Remote Deployment
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        # Pass GitHub secrets into the remote shell as env vars.
        # Each var is injected only if the corresponding secret is set.
        envs: VITE_POLAR_STARTUP_PRODUCT_ID,VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID,VITE_POLAR_GROWTH_PRODUCT_ID,VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID,VITE_EMAILJS_SERVICE_ID,VITE_EMAILJS_TEMPLATE_ID,VITE_EMAILJS_TEMPLATE_ID_CONTACT,VITE_EMAILJS_PUBLIC_KEY
        script: |
          set -e

          cp /opt/koreshield_deploy/docker-compose.prod.yml /opt/koreshield/docker-compose.prod.yml
          cp /opt/koreshield_deploy/Caddyfile /opt/koreshield/Caddyfile

          # Sync source files into the production directory that the compose
          # file at /opt/koreshield/docker-compose.prod.yml builds from.
          rsync -av --delete /opt/koreshield_deploy/koreshield/  /opt/koreshield/koreshield/
          rsync -av --delete /opt/koreshield_deploy/koreshield-web/ /opt/koreshield/koreshield-web/

          # Ensure the backend build context can find .env
          ln -sf /opt/koreshield/.env /opt/koreshield/koreshield/.env 2>/dev/null || true

          cd /opt/koreshield

          # ── Patch .env from CI secrets ──────────────────────────────────────
          # Values come from GitHub repository secrets, not hardcoded here.
          # To add or update a var: go to the repo → Settings → Secrets →
          # Actions → New repository secret.
          patch_env() {
            local var="$1" val="$2"
            [ -z "$val" ] && return 0   # skip if secret not set in GitHub
            if grep -q "^${var}=" .env 2>/dev/null; then
              sed -i "s|^${var}=.*|${var}=${val}|" .env
            else
              echo "${var}=${val}" >> .env
            fi
            echo "  ensured: ${var}"
          }
          echo "Syncing env vars from CI secrets..."
          patch_env "VITE_POLAR_STARTUP_PRODUCT_ID"        "$VITE_POLAR_STARTUP_PRODUCT_ID"
          patch_env "VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID" "$VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID"
          patch_env "VITE_POLAR_GROWTH_PRODUCT_ID"         "$VITE_POLAR_GROWTH_PRODUCT_ID"
          patch_env "VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID"  "$VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID"
          patch_env "VITE_EMAILJS_SERVICE_ID"              "$VITE_EMAILJS_SERVICE_ID"
          patch_env "VITE_EMAILJS_TEMPLATE_ID"             "$VITE_EMAILJS_TEMPLATE_ID"
          patch_env "VITE_EMAILJS_TEMPLATE_ID_CONTACT"     "$VITE_EMAILJS_TEMPLATE_ID_CONTACT"
          patch_env "VITE_EMAILJS_PUBLIC_KEY"              "$VITE_EMAILJS_PUBLIC_KEY"
          echo "  done."

          # Pre-clean: remove ALL containers (any name, any state) that match
          # koreshield-api or koreshield-web — including any hash-prefixed
          # intermediate containers Docker Compose creates during recreation.
          # Using --filter name= which does substring matching so it catches
          # both "koreshield-api" and "abc123_koreshield-api".
          # --force works on running containers too; || true so it never fails.
          docker ps -aq --filter "name=koreshield-api" | xargs -r docker rm -f || true
          docker ps -aq --filter "name=koreshield-web"  | xargs -r docker rm -f || true

          # Rebuild only the app containers.
          # --no-deps: never touch postgres, redis, or caddy — they manage themselves.
          # docker compose v2 (not legacy docker-compose) to avoid naming quirks.
          docker compose -f docker-compose.prod.yml up -d --build --no-deps api web

          # Smoke-test SPA callback routes and key pages behind nginx before
          # considering the deploy healthy. Give nginx and the web container a
          # short warm-up window so deploys do not fail on transient connection
          # resets immediately after container start.
          wait_for_url() {
            local url="$1"
            local label="$2"
            local attempt=1
            local max_attempts=20

            while [ "$attempt" -le "$max_attempts" ]; do
              if curl -fsSI "$url" > /dev/null; then
                echo "  healthy: ${label}"
                return 0
              fi
              echo "  waiting for ${label} (${attempt}/${max_attempts})"
              sleep 3
              attempt=$((attempt + 1))
            done

            echo "Timed out waiting for ${label}: ${url}" >&2
            docker compose -f docker-compose.prod.yml ps >&2 || true
            docker logs koreshield-web --tail 100 >&2 || true
            docker logs koreshield-api --tail 100 >&2 || true
            return 1
          }

          wait_for_url "http://127.0.0.1:3000/auth/google-callback" "google oauth callback route"
          wait_for_url "http://127.0.0.1:3000/auth/github-callback" "github oauth callback route"
          wait_for_url "http://127.0.0.1:3000/billing" "billing route"

          # Prune dangling images to reclaim disk space
          docker image prune -f

          echo "Deploy complete."
      env:
        VITE_POLAR_STARTUP_PRODUCT_ID: ${{ secrets.VITE_POLAR_STARTUP_PRODUCT_ID }}
        VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID: ${{ secrets.VITE_POLAR_STARTUP_ANNUAL_PRODUCT_ID }}
        VITE_POLAR_GROWTH_PRODUCT_ID: ${{ secrets.VITE_POLAR_GROWTH_PRODUCT_ID }}
        VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID: ${{ secrets.VITE_POLAR_GROWTH_ANNUAL_PRODUCT_ID }}
        VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
        VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
        VITE_EMAILJS_TEMPLATE_ID_CONTACT: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID_CONTACT }}
        VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
