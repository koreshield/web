name: Security — Attack Detection Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: "0 6 1 1,4,7,10 *"
  workflow_dispatch:

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-regression:
    name: SOC Regression Suite
    runs-on: [self-hosted, linux, x64]

    env:
      MIN_DETECTION_RATE: "99"
      MAX_FALSE_POSITIVE_RATE: "0"

    steps:
      - uses: actions/checkout@v4

      # ── 1. Obtain API key ────────────────────────────────────────────────────
      - name: Resolve CI API key
        id: resolve_key
        run: |
          set -euo pipefail

          # Prefer the static CI key stored in GitHub secrets.
          # If not set, provision one from the live management endpoint.
          if [ -n "${{ secrets.KS_CI_API_KEY }}" ]; then
            echo "Using KS_CI_API_KEY secret"
            echo "api_key=${{ secrets.KS_CI_API_KEY }}" >> "$GITHUB_OUTPUT"
          else
            echo "KS_CI_API_KEY secret not set — provisioning from live API"
            response_file=$(mktemp)
            status_code=$(curl -sS -o "$response_file" -w "%{http_code}" -X POST \
              https://api.koreshield.com/internal/test-keys \
              -H "X-Internal-Secret: ${{ secrets.SECRET_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"name": "ci-security-regression", "type": "test"}') || status_code="000"

            if [ "$status_code" != "200" ]; then
              echo "Failed to provision CI key (HTTP $status_code):"
              cat "$response_file"
              exit 1
            fi
            KEY=$(python3 -c "import json,sys; print(json.load(open('$response_file'))['key'])")
            echo "api_key=${KEY}" >> "$GITHUB_OUTPUT"
          fi

      # ── 2. Set up Python ──────────────────────────────────────────────────────
      - name: Install test script dependencies
        run: pip3 install scikit-learn --break-system-packages 2>/dev/null || pip install scikit-learn

      # ── 3. Run attack regression suite against live API ───────────────────────
      - name: Run attack regression suite (attack_sim.py)
        id: attack_sim
        working-directory: ./soc
        env:
          KS_API_KEY: ${{ steps.resolve_key.outputs.api_key }}
        run: |
          python3 attack_sim.py \
            --api-base https://api.koreshield.com \
            --api-key "${KS_API_KEY}" \
            --output /tmp/attack_results.json

          python3 - <<'PYEOF'
          import json, sys

          with open("/tmp/attack_results.json") as f:
              report = json.load(f)

          s = report["summary"]
          det  = s["detection_rate_pct"]
          fp   = s["false_positive_rate_pct"]
          errs = s["errors"]

          print(f"\n{'='*60}")
          print(f"  Attack Regression Results")
          print(f"  Detection rate   : {det}%  (gate: >=99%)")
          print(f"  False positives  : {fp}%   (gate: ==0%)")
          print(f"  Errors           : {errs}")

          if report.get("missed_attacks"):
              print("\n  MISSED ATTACKS:")
              for m in report["missed_attacks"]:
                  name = m.get("name") or m.get("description") or "UNKNOWN"
                  print(f"    [{m.get('id', '?')}] {name} ({m.get('severity','?')})")

          if report.get("false_positives"):
              print("\n  FALSE POSITIVES:")
              for fp_item in report["false_positives"]:
                  name = fp_item.get("name") or fp_item.get("description") or "UNKNOWN"
                  print(f"    [{fp_item.get('id', '?')}] {name}")
          print('='*60)

          failed = det < 99 or fp > 0
          if not failed:
              print("\n✅ Attack regression gate PASSED")
          else:
              if det < 99:
                  print(f"\n❌ GATE FAILED: detection rate {det}% < required 99%")
              if fp > 0:
                  print(f"\n❌ GATE FAILED: false positive rate {fp}% > allowed 0%")
          sys.exit(1 if failed else 0)
          PYEOF

      # ── 4. Run tenant isolation suite ─────────────────────────────────────────
      - name: Run tenant isolation suite (tenant_isolation_test.py)
        id: tenant_isolation
        working-directory: ./soc
        env:
          KS_API_KEY: ${{ steps.resolve_key.outputs.api_key }}
        run: |
          python3 tenant_isolation_test.py \
            --api-base https://api.koreshield.com \
            --api-key "${KS_API_KEY}" \
            --output /tmp/tenant_results.json

          python3 - <<'PYEOF'
          import json, sys

          with open("/tmp/tenant_results.json") as f:
              report = json.load(f)

          s = report["summary"]
          det  = s["detection_rate_pct"]
          fp   = s["false_positive_rate_pct"]
          errs = s["errors"]

          print(f"\n{'='*60}")
          print(f"  Tenant Isolation Results")
          print(f"  Detection rate   : {det}%  (gate: >=99%)")
          print(f"  False positives  : {fp}%   (gate: ==0%)")
          print(f"  Errors           : {errs}")
          print('='*60)

          failed = det < 99 or fp > 0
          if not failed:
              print("\n✅ Tenant isolation gate PASSED")
          else:
              if det < 99:
                  print(f"\n❌ GATE FAILED: detection {det}% < 99%")
              if fp > 0:
                  print(f"\n❌ GATE FAILED: false positives {fp}% > 0%")
          sys.exit(1 if failed else 0)
          PYEOF

      # ── 5. Upload artifacts ───────────────────────────────────────────────────
      - name: Upload test result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results-${{ github.run_id }}
          path: |
            /tmp/attack_results.json
            /tmp/tenant_results.json
          retention-days: 30
