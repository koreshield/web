name: "Code Scanning  -  Bandit (Python) & TS Type Check"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

jobs:
  # ── Python SAST with Bandit ──────────────────────────────────────────────────
  bandit-python:
    name: Bandit  -  Python Security Scan
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: ./koreshield

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bandit
        run: pip3 install "bandit[toml]" --break-system-packages 2>/dev/null || pip install "bandit[toml]"

      - name: Run Bandit scan
        run: |
          python3 -m bandit -r src/ \
            --exclude src/koreshield/tests \
            -f json \
            -o bandit-report.json \
            -ll -ii || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: koreshield/bandit-report.json

      - name: Fail on high-severity findings
        run: |
          python3 - <<'EOF'
          import json, sys
          try:
              with open("bandit-report.json") as f:
                  report = json.load(f)
              highs = [r for r in report.get("results", []) if r.get("issue_severity") == "HIGH"]
              if highs:
                  print(f" {len(highs)} HIGH severity finding(s):")
                  for h in highs:
                      print(f"  {h['filename']}:{h['line_number']}  -  {h['issue_text']}")
                  sys.exit(1)
              else:
                  print(" No HIGH severity findings.")
          except Exception as e:
              print(f"Warning: Could not parse report: {e}")
          EOF

  # ── TypeScript / Frontend  -  Build & Type Check ─────────────────────────────
  typescript-check:
    name: TypeScript  -  Build & Type Check
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: ./koreshield-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18 (nvm)
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 18 2>/dev/null || nvm install 18
          echo "NVM_DIR=$NVM_DIR" >> $GITHUB_ENV
          echo "PATH=$HOME/.nvm/versions/node/v18.20.8/bin:$PATH" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit || true

      - name: Build (validates no runtime errors)
        env:
          VITE_API_BASE_URL: https://api.koreshield.com
          VITE_WS_BASE_URL: wss://api.koreshield.com
          VITE_ENV: ci
          VITE_EMAILJS_SERVICE_ID: dummy
          VITE_EMAILJS_TEMPLATE_ID: dummy
          VITE_EMAILJS_TEMPLATE_ID_CONTACT: dummy
          VITE_EMAILJS_PUBLIC_KEY: dummy
        run: npm run build
