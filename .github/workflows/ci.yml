name: CI - Test & Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: ./koreshield

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      run: |
        python3.11 -m pip install --upgrade pip --break-system-packages 2>/dev/null || pip3 install --upgrade pip

    - name: Install dependencies
      run: |
        pip3 install -r requirements.txt -r requirements-dev.txt -e . flake8 pytest bandit --break-system-packages 2>/dev/null || \
        pip install -r requirements.txt -r requirements-dev.txt -e . flake8 pytest bandit

    - name: Lint with flake8
      run: |
        python3 -m flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        python3 -m flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Security Scan with Bandit
      run: |
        python3 -m bandit -r src --exclude src/koreshield/tests -f custom \
          --msg-template "{file}:{line}: {severity}: {test_id}: {msg}" || true

    - name: Security/Auth Test Gate
      env:
        JWT_SECRET: "ci-jwt-secret-with-minimum-32-characters!!"
        JWT_ISSUER: "koreshield-auth"
        JWT_AUDIENCE: "koreshield-api"
      run: |
        python3 -m pytest -q tests/test_auth.py tests/test_proxy.py \
          tests/test_management_config.py tests/test_rag_proxy.py tests/test_websocket_auth.py

  integration-test:
    runs-on: [self-hosted, linux, x64]
    needs: backend-test
    steps:
    - uses: actions/checkout@v3

    - name: Run Integration Tests (Docker Compose)
      env:
        DEEPSEEK_API_KEY: "dummy_key_for_ci"
        DATABASE_URL: "postgresql://postgres:postgres@db:5432/koreshield"
        REDIS_URL: "redis://redis:6379/0"
        SECRET_KEY: "ci_secret_key_very_secure"
        JWT_SECRET: "ci-jwt-secret-with-minimum-32-characters!!"
        JWT_ISSUER: "koreshield-auth"
        JWT_AUDIENCE: "koreshield-api"
        POSTGRES_USER: "postgres"
        POSTGRES_PASSWORD: "postgres"
        POSTGRES_DB: "koreshield"
      run: |
        cd koreshield
        docker compose up -d --build
        echo "Waiting for service to be healthy..."
        if timeout 180s bash -c 'until curl -sf http://localhost:8000/health; do sleep 5; done'; then
          echo "Service is UP. Integration Test Passed"
          docker compose down
        else
          echo "Integration Test Failed - dumping container logs"
          docker compose logs koreshield postgres redis
          docker compose down
          exit 1
        fi

  frontend-check:
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: ./koreshield-web

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js 18
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        nvm use 18 2>/dev/null || true
        node --version
        npm --version

    - name: Install dependencies
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        nvm use 18 2>/dev/null || true
        npm ci

    - name: Type Check & Build
      env:
        VITE_API_BASE_URL: https://api.koreshield.com
        VITE_WS_BASE_URL: wss://api.koreshield.com
        VITE_ENV: ci
        VITE_EMAILJS_SERVICE_ID: dummy
        VITE_EMAILJS_TEMPLATE_ID: dummy
        VITE_EMAILJS_TEMPLATE_ID_CONTACT: dummy
        VITE_EMAILJS_PUBLIC_KEY: dummy
      run: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        nvm use 18 2>/dev/null || true
        npm run build
