name: CI - Test & Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./koreshield

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install flake8 pytest

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Security Scan with Bandit
      run: |
        pip install bandit
        # Run bandit on source code, exclude tests. 
        # -r: recursive, -ll: log level, -ii: confidence level (optional)
        # We start with default profile.
        bandit -r src --exclude src/koreshield/tests -f custom --msg-template "{file}:{line}: {severity}: {test_id}: {msg}" || true
        # Note: We append || true to avoid failing the build immediately while we tune it.
        # Once specific issues are fixed, we can remove || true.

    - name: Security/Auth Test Gate
      env:
        JWT_SECRET: "ci-jwt-secret-with-minimum-32-characters!!"
        JWT_ISSUER: "koreshield-auth"
        JWT_AUDIENCE: "koreshield-api"
      run: |
        pytest -q tests/test_auth.py tests/test_proxy.py tests/test_management_config.py tests/test_rag_proxy.py tests/test_websocket_auth.py

  integration-test:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
    - uses: actions/checkout@v3

    - name: Run Integration Tests (Docker Compose)
      env:
        DEEPSEEK_API_KEY: "dummy_key_for_ci"
        # Add required envs for startup
        DATABASE_URL: "postgresql://postgres:postgres@db:5432/koreshield"
        REDIS_URL: "redis://redis:6379/0"
        SECRET_KEY: "ci_secret_key_very_secure"
        JWT_SECRET: "ci-jwt-secret-with-minimum-32-characters!!"
        JWT_ISSUER: "koreshield-auth"
        JWT_AUDIENCE: "koreshield-api"
        POSTGRES_USER: "postgres"
        POSTGRES_PASSWORD: "postgres"
        POSTGRES_DB: "koreshield"
      run: |
        cd koreshield
        # Start the stack
        docker compose up -d --build
        
        echo "Waiting for service to be healthy..."
        # Loop check health endpoint
        timeout 120s bash -c 'until curl -sf http://localhost:8000/health; do sleep 5; done'
        
        echo "Service is UP. API Health Check Passed."
        
        # Determine success
        if [ $? -eq 0 ]; then
          echo "Integration Test Passed"
        else
          echo "Integration Test Failed"
          docker compose logs
          exit 1
        fi
        
        docker compose down

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./koreshield-web

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        # cache: 'npm' - Disabled to rule out path issues regarding package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type Check & Build
      run: npm run build
      # This validates TS types and checks for build errors
