name: CI - Test & Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./koreshield

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install flake8 pytest

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      env:
        DATABASE_URL: sqlite+aiosqlite:///:memory:
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test_secret_key
        # We might need a real redis service for tests if we use it extensively
      run: |
        # For now, just run tests if they exist. If no tests, we echo pass.
        if [ -d "tests" ]; then pytest; else echo "No tests found yet"; fi

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./koreshield-web

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: koreshield-web/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type Check & Build
      run: npm run build
      # This validates TS types and checks for build errors
