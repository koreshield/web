name: Deploy Blog to Cloudflare Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'koreshield-blog/**'
      # Exclude auto-generated files so sitemap regeneration commits and
      # accidental sitemap inclusions in platform commits don't trigger a
      # full Cloudflare Pages rebuild.
      - '!koreshield-blog/public/sitemap.xml'
      - '!koreshield-blog/public/robots.txt'
      - '.github/workflows/blog-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies (Studio)
        run: |
          cd koreshield-blog/studio
          pnpm install

      - name: Build Sanity Studio
        run: |
          cd koreshield-blog/studio
          pnpm run build

      - name: Install Dependencies (Blog)
        run: |
          cd koreshield-blog
          pnpm install

      - name: Build Astro Blog
        run: |
          cd koreshield-blog
          pnpm run build

      - name: Merge Studio into Blog
        run: |
          mkdir -p koreshield-blog/dist/studio
          cp -rv koreshield-blog/studio/dist/* koreshield-blog/dist/studio/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy koreshield-blog/dist --project-name=koreshield-blog --branch=main --commit-dirty=true
