version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/llm-firewall"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "nsisongltd"
    assignees:
      - "nsisongltd"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "nsisongltd"
    assignees:
      - "nsisongltd"
    commit-message:
      prefix: "deps"
      include: "scope"