version: 2

updates:
  # Python backend dependencies
  - package-ecosystem: "pip"
    directory: "/koreshield"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "nsisong"
    labels:
      - "dependencies"
      - "security"
    groups:
      # Group minor/patch updates together to reduce PR noise
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Frontend (npm) dependencies
  - package-ecosystem: "npm"
    directory: "/koreshield-web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "nsisong"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Python SDK dependencies
  - package-ecosystem: "pip"
    directory: "/koreshield-python-sdk"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "nsisong"
    labels:
      - "dependencies"
      - "sdk"

  # JavaScript SDK dependencies
  - package-ecosystem: "npm"
    directory: "/koreshield-js-sdk"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "nsisong"
    labels:
      - "dependencies"
      - "sdk"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
